name: Jot
options:
  bundleIdPrefix: com.jot
  deploymentTarget:
    macOS: "13.0"
targets:
  Jot:
    type: application
    platform: macOS
    sources:
      - Jot
    info:
      path: Jot/Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Jot"
    settings:
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  JotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - JotTests
    dependencies:
      - target: Jot
    settings:
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      GENERATE_INFOPLIST_FILE: YES
